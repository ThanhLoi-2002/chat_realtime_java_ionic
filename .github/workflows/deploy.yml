name: Sync Backend to Hugging Face
on:
  push:
    branches: [main]
    paths:
      - 'zalo-backend/**' # Đã sửa ở đây
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Push Subdirectory to HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          
          # Sửa 'be' thành 'zalo-backend' ở dòng dưới này
          git subtree split --prefix=zalo-backend -b backend-only

          # Ép nhánh này lên Space 'zalo-server'
          git push --force https://$HF_USERNAME:$HF_TOKEN@huggingface.co/spaces/$HF_USERNAME/zalo-server backend-only:main