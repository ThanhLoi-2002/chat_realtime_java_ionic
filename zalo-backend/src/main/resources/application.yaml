server:
  port: ${PORT:8080}
  servlet:
    context-path: /api
spring:
  application:
    name: zalo

  kafka:
    consumer:
      group-id: notification-consumers
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
      enable-auto-commit: false # Tự quản lý commit để đảm bảo không mất tin nhắn nếu sập nguồn

      # TỐI ƯU CONSUMER:
      max-poll-records: 1000     # Mỗi lần pull dữ liệu từ Kafka, lấy hẳn 1000 tin nhắn về xử lý 1 lượt.
      properties:
        fetch.min.bytes: 1048576 # 1MB - Thắt nút cổ chai: Chỉ kéo về khi Kafka gom đủ 1MB dữ liệu.
        fetch.max.wait.ms: 500   # Nếu quá 500ms không đủ 1MB thì vẫn kéo về.

    # Chuyển đổi cơ chế lắng nghe từ từng cái sang dạng BATCH
    listener:
      type: batch
      ack-mode: manual_immediate # Commit ngay sau khi xử lý xong lô dữ liệu

  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
    ai-url: "http://localhost:8000/api"

  datasource:
#    url: "jdbc:mysql://localhost:3306/zalo"
#    username: root
#    password: "1"
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    database-platform: org.hibernate.dialect.MariaDBDialect
    hibernate:
      ddl-auto: update
#    show-sql: true
#    properties:
#      hibernate:
#        dialect: org.hibernate.dialect.MySQL8Dialect

jwt:
  signerKey: ${JWT_SIGNER_KEY}
  valid-duration: 3600 # in second
  refreshable-duration: 36000 # in seconds

cloudinary:
  cloud-name: ${CLOUDINARY_NAME}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] %logger{36}.%M(%line) : %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] %logger{36}.%M(%line) : %msg%n"

kafka:
  url: "localhost:9092"

minio:
  endpoint: ${MINIO_URL}
  access-key: ${MINIO_ACCESS_KEY}
  secret-key: ${MINIO_SECRET_KEY}
  bucket: ${MINIO_BUCKET}